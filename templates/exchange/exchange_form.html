{% extends "base.html" %}

{% block title %}Предложить обмен{% endblock %}

{% block content %}
<section class="form-page">
  <div>
    <p class="eyebrow">предложение обмена</p>
    <h1>{{ requested_listing.title }}</h1>
    <p>Выберите свое объявление и укажите способ связи, чтобы владелец мог ответить после принятия обмена.</p>
  </div>
  <form class="form-card" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit">Отправить предложение</button>
    </div>
  </form>
</section>
{% endblock %}
