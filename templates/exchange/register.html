{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="page-heading">
    <p class="eyebrow">новый профиль</p>
    <h1>Регистрация</h1>
    <p>Создайте профиль, чтобы добавлять свои товары и обмениваться с другими пользователями.</p>
  </div>

  <form class="form-card auth-card" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit">Создать аккаунт</button>
    </div>
    <p class="form-note">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
  </form>
</section>
{% endblock %}
