services:
  db:
    image: postgres:16
    container_name: barterexchange_db
    environment:
      POSTGRES_DB: barterexchange
      POSTGRES_USER: barterexchange
      POSTGRES_PASSWORD: barterexchange
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barterexchange -d barterexchange"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: barterexchange_web
    command: >
      sh -c "python manage.py migrate &&
      python manage.py shell -c \"from django.core.management import call_command; from exchange.models import Listing; call_command('seed_demo') if not Listing.objects.exists() else print('Demo data already exists')\" &&
      python manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_DB: barterexchange
      POSTGRES_USER: barterexchange
      POSTGRES_PASSWORD: barterexchange
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
